name: Server Bootstrap

on:
  workflow_dispatch:
    inputs:
      certbot_email:
        description: Email for Let's Encrypt registration
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      APP_ROOT: /var/www/superclaw101
      APP_DOMAIN: superclaw.opencaio.cn
      NGINX_CONF: /etc/nginx/sites-available/superclaw.opencaio.cn.conf
      NGINX_BOOTSTRAP_CONF: /etc/nginx/sites-available/superclaw.opencaio.cn.bootstrap.conf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload bootstrap assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ops/nginx/superclaw.opencaio.cn.conf"
          target: "/tmp/superclaw101-bootstrap"
          strip_components: 0
          overwrite: true

      - name: Bootstrap server and nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y nginx certbot python3-certbot-nginx

            sudo mkdir -p "${{ env.APP_ROOT }}/releases" "${{ env.APP_ROOT }}/shared"
            sudo chown -R "$USER:$USER" "${{ env.APP_ROOT }}"

            sudo tee "${{ env.NGINX_BOOTSTRAP_CONF }}" >/dev/null <<'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name ${{ env.APP_DOMAIN }};

                root ${{ env.APP_ROOT }}/current;
                index index.html;

                location / {
                    try_files $uri $uri/ =404;
                }

                location = /404.html {
                    internal;
                }

                error_page 404 /404.html;
            }
            EOF

            sudo ln -sfn "${{ env.NGINX_BOOTSTRAP_CONF }}" /etc/nginx/sites-enabled/superclaw.opencaio.cn.conf
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl enable nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx

            sudo certbot --nginx \
              --non-interactive \
              --agree-tos \
              --redirect \
              --email "${{ github.event.inputs.certbot_email }}" \
              -d "${{ env.APP_DOMAIN }}"

            sudo cp "/tmp/superclaw101-bootstrap/ops/nginx/superclaw.opencaio.cn.conf" "${{ env.NGINX_CONF }}"
            sudo ln -sfn "${{ env.NGINX_CONF }}" /etc/nginx/sites-enabled/superclaw.opencaio.cn.conf
            sudo nginx -t
            sudo systemctl reload nginx
